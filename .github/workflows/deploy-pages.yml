name: Deploy GitHub Pages

on:
  workflow_call:
    inputs:
      source_dir:
        description: Directory to deploy (default: slides)
        type: string
        default: slides

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare public dir
        run: |
          mkdir -p _public
          rsync -av --exclude='.git' --exclude='.github' --exclude='README.md' --exclude='*.yml' \
            ${{ inputs.source_dir }}/ _public/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _public

      - id: deployment
        uses: actions/deploy-pages@v4
